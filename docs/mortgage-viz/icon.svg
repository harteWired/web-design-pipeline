<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- House body -->
  <rect x="14" y="30" width="36" height="24" rx="2" fill="#c8c2b4" stroke="#8b4534" stroke-width="2.5"/>
  <!-- Roof -->
  <path d="M8 32 L32 12 L56 32" stroke="#8b4534" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Door -->
  <rect x="26" y="38" width="12" height="16" rx="1.5" fill="#8b4534"/>
  <!-- Doorknob -->
  <circle cx="35" cy="47" r="1.5" fill="#c8c2b4"/>
  <!-- Window left -->
  <rect x="18" y="36" width="6" height="6" rx="1" fill="none" stroke="#3d5a68" stroke-width="1.5"/>
  <line x1="21" y1="36" x2="21" y2="42" stroke="#3d5a68" stroke-width="1"/>
  <line x1="18" y1="39" x2="24" y2="39" stroke="#3d5a68" stroke-width="1"/>
  <!-- Window right -->
  <rect x="40" y="36" width="6" height="6" rx="1" fill="none" stroke="#3d5a68" stroke-width="1.5"/>
  <line x1="43" y1="36" x2="43" y2="42" stroke="#3d5a68" stroke-width="1"/>
  <line x1="40" y1="39" x2="46" y2="39" stroke="#3d5a68" stroke-width="1"/>
  <!-- Chimney -->
  <rect x="42" y="16" width="6" height="14" rx="1" fill="#c8c2b4" stroke="#8b4534" stroke-width="2"/>
  <!-- Heatmap grid accent (3x3 tiny squares in roof area) -->
  <g transform="translate(24, 20)" opacity="0.6">
    <rect x="0" y="0" width="4" height="4" rx="0.5" fill="#3a5664"/>
    <rect x="5" y="0" width="4" height="4" rx="0.5" fill="#738764"/>
    <rect x="10" y="0" width="4" height="4" rx="0.5" fill="#ac7650"/>
    <rect x="0" y="5" width="4" height="4" rx="0.5" fill="#5b6c6c"/>
    <rect x="5" y="5" width="4" height="4" rx="0.5" fill="#afa070"/>
    <rect x="10" y="5" width="4" height="4" rx="0.5" fill="#9e5234"/>
  </g>
</svg>
