    <!-- Anti-FOUC: paint ink immediately so dark theme doesn't flash white. -->
    <style>
      :root { color-scheme: dark; }
      html[data-theme="dark"] { background: #15151e; }
      html[data-theme="light"] { background: #fafaf6; color-scheme: light; }
      body { margin: 0; }
    </style>

    <!-- Theme bootstrap before paint — avoids the wrong-mode flash on reload. -->
    <script>
      (function () {
        try {
          var stored = localStorage.getItem("mortgage-viz-theme");
          if (stored === "light" || stored === "dark") {
            document.documentElement.setAttribute("data-theme", stored);
          } else {
            document.documentElement.setAttribute("data-theme", "dark");
          }
        } catch (_) { /* localStorage may be unavailable */ }
      })();
    </script>
